<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOLARIUM</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <a href="./index.html" class="header-logo">SOLARIUM</a>
        <nav class="header-nav">
          <ul class="header-list">
            <li class="header-item">
              <a class="header-link" href="#">Trends</a>
            </li>
            <li class="header-item">
              <a class="header-link" href="#">Archives</a>
            </li>
            <li class="header-item">
              <a class="header-link" href="#">Drops</a>
            </li>
            <li class="header-item">
              <a class="header-link" href="#">Community</a>
            </li>
          </ul>
        </nav>
        <button type="button" class="header-btn">Join the Club</button>
      </div>
    </header>

    <section class="hero">
      <div class="container hero-container">
        <div class="hero-content">
          <p class="hero-label">THE Y2K RENAISSANCE</p>

          <h1 class="hero-title">
            <span class="hero-dark">Y2K Era &</span>
            <span class="hero-accent">Streetwear</span>
          </h1>

          <p class="hero-text">
            Your Style – Your Rules. Curating the sun-drenched aesthetics of the
            millennium for the modern concrete jungle.
          </p>

          <div class="hero-actions">
            <a href="#" class="hero-btn hero-primary">
              Explore Archive
              <span class="hero-arrow">
                <img src="./img/arrow.png" alt="" />
              </span>
            </a>

            <a href="#" class="hero-btn hero-secondary">View Drops</a>
          </div>
        </div>

        <img class="hero-img" src="./img/2cards.png" alt="cards" />
      </div>
    </section>
  </body>
</html>
